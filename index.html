<!DOCTYPE html>
<html>
<body>

    <p>I'm thinking of a number. Can you guess it?<br>
    Type a number between 1 and 10.</p>

    <input id="myInput" type="text">
    <button onclick="myFunction()">Is it right?</button>

    <p id="demo"></p>

    <script>
        // Generates a random number between 1 and 10
        var correct = Math.floor(Math.random() * 10) + 1;

        function myFunction() {
            var guessBox = document.getElementById("myInput");
            var guess = Number(guessBox.value);
            var text;

            if (correct === guess) {
                text = "That's it! Great job!";
            } else if (guess > correct) {
                text = "Try lower.";
            } else {
                text = "Try higher.";
            }

            document.getElementById("demo").innerHTML = text;
        }
    </script>

</body>
</html>
